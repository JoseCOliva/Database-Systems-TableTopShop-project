<!DOCTYPE html>
<html>
<head>
    <title>Tabletop Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header class="header">
    <h1>Tabletop Shop</h1>
</header>

<div class="container">

<h2>Products</h2>

<table class="product-table">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Stock</th>
    <th>Price</th>
</tr>

{% for product in products %}
<tr>
    <td>{{ product.product_id }}</td>
    <td>{{ product.product_name }}</td>
    <td>{{ product.stock }}</td>
    <td>${{ product.price }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
